<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fervox AI</title>

    <!-- PWA Web App Manifest Link -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Link to your local App Icon -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Ultra-Clean Service Worker Registration Script -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

    <style>
        /* Full screen Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
        }

        /* Seamless Portal View for Google AI Studio */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Embeds your AI Studio App seamlessly inside your PWA wrapper -->
    <iframe 
        src="https://fervox-ai.ai.studio" 
        allow="microphone; clipboard-read; clipboard-write;">
    </iframe>

</body>
</html>
