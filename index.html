<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fervox AI</title>

    <!-- Absolute PWA Paths for GitHub Pages -->
    <link rel="manifest" href="/frostler-ai/manifest.json">
    <link rel="icon" type="image/png" href="/frostler-ai/icon.png">
    <link rel="apple-touch-icon" href="/frostler-ai/icon.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/frostler-ai/sw.js', { scope: '/frostler-ai/' })
                    .then(reg => console.log('SW Registered:', reg.scope))
                    .catch(err => console.log('SW Failed:', err));
            });
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- PASTE YOUR CLEAN, COPIED LINK IN THE SRC BELOW (NO SPACES!) -->
    <iframe src="https://fervox-ai.ai.studio"></iframe>

</body>
</html>
