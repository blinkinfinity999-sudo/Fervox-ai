<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fervox AI</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => console.log('SW Registered:', reg.scope))
                    .catch(err => console.log('SW Failed:', err));
            });
        }
    </script>

    <style>
        /* Resets the screen completely */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
        }
        /* Forces the AI Studio link to take up the full window */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Put your published AI Studio web app link in the src below -->
    <iframe src="https://fervox ai.ai.studio"></iframe>

</body>
</html>
