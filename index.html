<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frostler AI</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        img {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: #8b949e;
            margin-bottom: 30px;
        }
        .launch-btn {
            display: inline-block;
            background: linear-gradient(45deg, #1f6feb, #238636);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.4);
            transition: transform 0.2s;
        }
        .launch-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="icon.png" alt="Frostler AI Logo">
        <h1>Frostler AI</h1>
        <p>Unlock advanced AI computing capabilities.</p>
        
        <a href="YOUR_GOOGLE_AI_STUDIO_URL_HERE" class="launch-btn">Launch Chat Engine</a>
    </div>

</body>
</html>
